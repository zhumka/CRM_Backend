# Production-конфигурация: API запускается из готового образа (GHCR),
# собранного в CI. Используется на сервере при деплое.
#
# Требуется .env рядом с этим файлом (см. .env.example) с переменными:
#   IMAGE, JWT_SECRET, DB_USER, DB_PASSWORD, DB_NAME, ADMIN_PASSWORD и т.д.

services:
  db:
    image: postgres:16-alpine
    container_name: crm_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-crm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-crm}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-crm} -d ${DB_NAME:-crm}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: ${IMAGE:?IMAGE is required (e.g. ghcr.io/owner/crm:latest)}
    container_name: crm_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      HTTP_PORT: "8080"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-crm}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:-crm}
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_TTL_HOURS: ${JWT_TTL_HOURS:-24}
      GIN_MODE: release
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      SEED_DEMO: ${SEED_DEMO:-false}
    ports:
      - "${HTTP_PORT:-8080}:8080"

volumes:
  pgdata:
